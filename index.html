<!doctype html>
<html lang="si">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#5A1410" />
  <title>කෞශානි &amp; ගෞරව · මංගල ආරාධනය</title>
  <meta name="description" content="කෞශානි හා ගෞරව මංගල්‍යය — හෙළ සිරිත. උඩරට සිරිතින් සැරසුණු ආරාධනයකි. ඔබ සැම සාදරයෙන් ආරාධනා කරමු." />
  <meta property="og:title" content="කෞශානි &amp; ගෞරව · මංගල ආරාධනය" />
  <meta property="og:description" content="හෙළ සිරිත — උඩරට මංගල ආරාධනය" />
  <meta property="og:type" content="website" />

  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dzrfpc9be/image/upload/v1781120583/favicon_jb60x8.png" />
  <link rel="apple-touch-icon" href="https://res.cloudinary.com/dzrfpc9be/image/upload/v1781120583/favicon_jb60x8.png" />

  <!-- Traditional Sinhala display fonts (FIX: Abhaya Libre + Noto Serif Sinhala — true Sinhala glyphs, never boxy) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;600;700;800&family=Noto+Serif+Sinhala:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Great+Vibes&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>

  <!-- ════ GATEWAY · Sannasa unrolling ════ -->
  <div id="gateway">
    <div class="scroll-panel">
      <div class="gw-lamp" id="gwLamp"></div>
      <div class="gw-ayu brass-text" id="gwAyu"></div>
      <div class="gw-couple" id="gwCouple"></div>
      <div class="js-liyawela divider tight"></div>
      <div class="gw-prompt" id="gwPrompt"></div>
      <button class="gw-enter" id="enterBtn">ආරාධනය විවෘත කරන්න</button>
    </div>
  </div>

  <!-- ════ TOP BAR ════ -->
  <header class="topbar">
    <a class="brand" href="#hero"><span class="dot"></span><span id="brandName">හෙළ සිරිත</span></a>
    <nav class="navlinks">
      <a href="#invitation" id="nav-invitation">ආරාධනාව</a>
      <a href="#agenda" id="nav-agenda">සැලැස්ම</a>
      <a href="#gallery" id="nav-gallery">මංසලකුණු</a>
      <a href="#blessings" id="nav-blessings">සුබ පැතුම්</a>
      <a href="#rsvp" id="nav-rsvp">පැමිණීම</a>
    </nav>
  </header>

  <main>
    <!-- ════ HERO ════ -->
    <section id="hero">
      <div class="wrap">
        <div class="hero-grid">
          <div class="hero-sesath left" id="heroSesathL"></div>
          <div class="hero-core">
            <div class="thorana-crown" id="heroThorana"></div>
            <div class="couple-frame" id="coupleImg"></div>
            <h1 class="hero-names brass-text" id="heroNames"></h1>
            <p class="hero-tag" id="heroTag"></p>
            <div class="hero-meta">
              <div class="hero-date" id="heroDate"></div>
              <div class="hero-venue" id="heroVenue"></div>
            </div>
            <a class="scroll-cue" href="#invitation" aria-label="පහළට"><span></span></a>
          </div>
          <div class="hero-sesath right" id="heroSesathR"></div>
        </div>
      </div>
    </section>

    <!-- ════ INVITATION ════ -->
    <section id="invitation">
      <div class="wrap">
        <div class="thorana-crown" id="invThorana"></div>
        <div class="panel invite-card">
          <span class="corner tl js-corner"></span><span class="corner tr js-corner"></span>
          <span class="corner bl js-corner"></span><span class="corner br js-corner"></span>
          <h2 class="shubha brass-text" id="shubha"></h2>
          <div id="inviteBody"></div>
        </div>
      </div>
    </section>

    <!-- ════ COUNTDOWN ════ -->
    <section id="countdown">
      <div class="wrap center">
        <h2 class="sec-title brass-text" id="cdTitle"></h2>
        <div class="js-liyawela divider"></div>
        <div class="cd-grid" id="cdGrid">
          <div class="cd-cell" id="cdD"><div class="cd-num">00</div><div class="cd-lbl">දින</div></div>
          <div class="cd-cell" id="cdH"><div class="cd-num">00</div><div class="cd-lbl">පැය</div></div>
          <div class="cd-cell" id="cdM"><div class="cd-num">00</div><div class="cd-lbl">මිනිත්තු</div></div>
          <div class="cd-cell" id="cdS"><div class="cd-num">00</div><div class="cd-lbl">තත්පර</div></div>
        </div>
        <div class="cd-done brass-text" id="cdDone" style="display:none"></div>
      </div>
    </section>

    <!-- ════ AGENDA ════ -->
    <section id="agenda">
      <div class="wrap center">
        <h2 class="sec-title brass-text" id="agendaTitle"></h2>
        <p class="sec-sub" id="agendaSub"></p>
        <div class="js-liyawela divider"></div>
        <div class="agenda-list" id="agendaList"></div>
      </div>
    </section>

    <!-- ════ GALLERY ════ -->
    <section id="gallery">
      <div class="wrap center">
        <h2 class="sec-title brass-text" id="galleryTitle"></h2>
        <p class="sec-sub" id="gallerySub"></p>
        <div class="js-liyawela divider"></div>
        <div class="masonry" id="masonry"></div>
      </div>
    </section>

    <!-- ════ LOVE NOTE ════ -->
    <section id="lovenote">
      <div class="wrap">
        <div class="panel">
          <span class="corner tl js-corner"></span><span class="corner tr js-corner"></span>
          <span class="corner bl js-corner"></span><span class="corner br js-corner"></span>
          <h2 class="sec-title center brass-text" id="loveTitle"></h2>
          <p class="sec-sub center" id="loveSub"></p>
          <div class="js-liyawela divider tight"></div>
          <p class="love-text" id="loveText"></p>
          <div class="love-sign" id="loveSign"></div>
        </div>
      </div>
    </section>

    <!-- ════ MANGALA PAHANA / confirmed count ════ -->
    <section id="lamp">
      <div class="wrap center">
        <h2 class="sec-title brass-text" id="lampTitle"></h2>
        <p class="sec-sub" id="lampSub"></p>
        <div class="lamp-wrap">
          <div class="lamp-svg" id="lampSvg"></div>
          <div class="lamp-count brass-text" id="lampCount">0</div>
          <div class="lamp-cap" id="lampCap"></div>
        </div>
      </div>
    </section>

    <!-- ════ BLESSINGS ════ -->
    <section id="blessings">
      <div class="wrap center">
        <h2 class="sec-title brass-text" id="blessingsTitle"></h2>
        <p class="sec-sub" id="blessingsSub"></p>
        <div class="js-liyawela divider"></div>
        <div class="bless-grid" id="blessGrid"></div>
        <div class="panel bless-form">
          <div class="field"><label id="blNameLbl"></label><input class="inp" id="blName" type="text" maxlength="60" /></div>
          <div class="field"><label id="blMsgLbl"></label><textarea class="inp" id="blMsg" maxlength="400"></textarea></div>
          <button class="btn" id="blSend"></button>
          <p class="note" id="blStatus"></p>
        </div>
      </div>
    </section>

    <!-- ════ RSVP ════ -->
    <section id="rsvp">
      <div class="wrap">
        <div class="rsvp-grid">
          <div class="rsvp-sesath left" id="rsvpSesathL"></div>
          <div class="panel rsvp-card">
            <span class="corner tl js-corner"></span><span class="corner tr js-corner"></span>
            <span class="corner bl js-corner"></span><span class="corner br js-corner"></span>
            <h2 class="sec-title center brass-text" id="rsvpTitle"></h2>
            <p class="sec-sub center" id="rsvpSub"></p>
            <div class="js-liyawela divider tight"></div>

            <p class="rsvp-closed" id="rsvpClosed" style="display:none"></p>

            <div id="rsvpStages">
              <p class="note" id="rsvpHelp"></p>

              <div class="rsvp-stage active" id="stSearch">
                <div class="search-row">
                  <input class="inp" id="rsvpSearchInput" type="text" />
                  <button class="btn" id="rsvpSearchBtn"></button>
                </div>
                <div class="guest-results" id="rsvpResults"></div>
              </div>

              <div class="rsvp-stage" id="stChoice">
                <p class="center" style="font-family:var(--f-disp);font-weight:800;font-size:1.3rem;color:var(--maroon-2);margin:.4rem 0">— <span id="rsvpGuestName"></span> —</p>
                <p class="center" id="willAttendQ" style="font-weight:700"></p>
                <div class="choice-row">
                  <button class="choice yes" id="choiceYes"></button>
                  <button class="choice no" id="choiceNo"></button>
                </div>
                <div id="attendExtras" style="display:none">
                  <p class="center" id="liquorQ" style="font-weight:700;margin-top:.6rem"></p>
                  <div class="choice-row">
                    <button class="choice yes" id="liqYes"></button>
                    <button class="choice no" id="liqNo"></button>
                  </div>
                  <p class="center" id="countQ" style="font-weight:700;margin-top:.6rem"></p>
                  <div class="party-row">
                    <button class="party-btn" id="pMinus" aria-label="අඩු">−</button>
                    <span class="party-val" id="pVal">1</span>
                    <button class="party-btn" id="pPlus" aria-label="වැඩි">+</button>
                  </div>
                  <div class="field"><label id="dietLbl"></label><textarea class="inp" id="rsvpDiet" rows="2"></textarea></div>
                </div>
                <div class="center" style="margin-top:1.1rem"><button class="btn" id="rsvpSubmit"></button></div>
              </div>

              <div class="rsvp-stage" id="stThanks">
                <div class="rsvp-thanks">
                  <div class="big brass-text" id="rsvpThanksTitle"></div>
                  <p id="rsvpThanksMsg" style="margin-top:.6rem;color:var(--ink-soft)"></p>
                  <button class="btn ghost" id="rsvpAgain" style="margin-top:1.2rem"></button>
                </div>
              </div>
            </div>
          </div>
          <div class="rsvp-sesath right" id="rsvpSesathR"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- ════ FOOTER ════ -->
  <footer>
    <div class="foot-perahera" id="footPerahera"></div>
    <div class="foot-kalasa" id="footKalasa"></div>
    <div class="foot-names" id="footNames"></div>
    <div class="foot-date" id="footDate"></div>
    <div class="foot-actions" id="footActions"></div>
    <div class="foot-credit">සෙනෙහසින් නිමවන ලදී <span class="heart">♥</span> · හෙළ සිරිත</div>
  </footer>

  <!-- ════ Floating controls ════ -->
  <button class="fab" id="musicBtn" aria-label="මංගල සංගීතය" aria-pressed="false" style="display:none">
    <svg class="mute" viewBox="0 0 24 24" fill="currentColor"><path d="M4 9v6h4l5 5V4L8 9H4z"/><path d="M16 8l5 8M21 8l-5 8" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg>
    <svg class="wave" viewBox="0 0 24 24" fill="currentColor"><path d="M4 9v6h4l5 5V4L8 9H4z"/><path d="M16 8a5 5 0 010 8M18.5 6a8 8 0 010 12" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg>
  </button>
  <button class="fab" id="toTop" aria-label="ඉහළට">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
  </button>

  <!-- Falling petals -->
  <div id="petals" aria-hidden="true"></div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <button class="lb-close" id="lbClose" aria-label="වසන්න">✕</button>
    <button class="lb-btn lb-prev" id="lbPrev" aria-label="පෙර">‹</button>
    <img id="lbImg" src="" alt="" />
    <button class="lb-btn lb-next" id="lbNext" aria-label="ඊළඟ">›</button>
    <div class="lb-cap" id="lbCap"></div>
  </div>

  <!-- Scripts: ornaments (classic, defines window.ORN) then app (module) -->
  <script src="assets/ornaments.js"></script>
  <script type="module" src="assets/app.js"></script>
</body>
</html>
