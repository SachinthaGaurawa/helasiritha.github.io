<!-- ░░ Sannasa SVG filters (your exact emboss + edge-fray) ░░ -->
<svg width="0" height="0" aria-hidden="true" focusable="false" style="position:absolute;width:0;height:0;overflow:hidden">
  <defs>
    <filter id="hs-edge-light" x="-6%" y="-6%" width="112%" height="112%" color-interpolation-filters="sRGB">
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="3" seed="14" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="hs-emboss" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="6" specularConstant="1" specularExponent="16" lighting-color="#ffffff" result="spec"><feDistantLight azimuth="45" elevation="45"/></feSpecularLighting>
      <feDiffuseLighting in="blur" surfaceScale="6" diffuseConstant="1" lighting-color="#d1a56f" result="diff"><feDistantLight azimuth="45" elevation="45"/></feDiffuseLighting>
      <feBlend in="diff" in2="spec" mode="screen" result="lit"/>
      <feComposite in="lit" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="hs-paper-grain" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="6" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#ffe7cc" surfaceScale="3.8" result="light"><feDistantLight azimuth="45" elevation="55"/></feDiffuseLighting>
      <feComposite operator="arithmetic" k1="1" k2="0" k3="0" k4="0" in="SourceGraphic" in2="light"/>
    </filter>
    <filter id="hs-edge-heavy" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <feTurbulence type="turbulence" baseFrequency="0.065" numOctaves="5" seed="28" result="tn"/>
      <feDisplacementMap in="SourceGraphic" in2="tn" scale="18" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<script>
/* Entry gateway — standalone, independent of app.js so it can never trap a visitor */
(function(){
  var e=document.getElementById('entry'); if(!e){return;}
  var done=false;
  function enter(){
    if(done){return;} done=true;
    e.classList.add('go');
    document.documentElement.classList.add('entered');
    var p=document.getElementById('preloader'); if(p){ p.classList.add('gone'); }
    setTimeout(function(){ if(e&&e.parentNode){ e.parentNode.removeChild(e); } }, 1600);
  }
  var b=document.getElementById('entryEnter');
  if(b){ b.addEventListener('click', enter); }
  e.addEventListener('click', function(ev){ if(ev.target===e){ enter(); } });
  document.addEventListener('keydown', function(ev){
    if(!done && (ev.key==='Enter' || ev.key===' ' || ev.key==='Escape')){ enter(); }
  });
})();
</script>
<script>
/* Sannasa scroll — your --unroll-progress engine, triggered on reveal (independent of app.js) */
(function(){
  try{
    var master=document.getElementById('sannasaMaster');
    var paper=document.getElementById('sannasaPaper');
    var sec=document.getElementById('invitation');
    if(!master||!paper||!sec){return;}

    var CAPS=[
      {q:'.sannasa-roll.top .roll-cap.left svg',    s:-1, m:false},
      {q:'.sannasa-roll.top .roll-cap.right svg',   s: 1, m:true },
      {q:'.sannasa-roll.bottom .roll-cap.left svg', s: 1, m:false},
      {q:'.sannasa-roll.bottom .roll-cap.right svg',s:-1, m:true }
    ].map(function(c){ c.el=sec.querySelector(c.q); return c; });

    function measure(){ master.style.setProperty('--paper-h', paper.scrollHeight+'px'); }
    measure();
    if('ResizeObserver' in window){ new ResizeObserver(measure).observe(paper); }
    window.addEventListener('load', measure);
    window.addEventListener('resize', measure);

    var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function setProgress(p){
      master.style.setProperty('--unroll-progress', p);
      var r = p * 720; // two full rotations, exactly as your engine
      for(var i=0;i<CAPS.length;i++){
        var c=CAPS[i];
        if(c.el) c.el.style.transform = (c.m?'scaleX(-1) ':'') + 'rotate(' + (c.s*r) + 'deg)';
      }
    }

    var started=false;
    function run(){
      if(started) return; started=true; measure();
      if(reduce){ setProgress(1); return; }
      var dur=2200, t0=null;
      function ease(x){ return x<0.5 ? 4*x*x*x : 1 - Math.pow(-2*x+2,3)/2; } // easeInOutCubic
      function frame(ts){
        if(t0===null) t0=ts;
        var k=Math.min(1,(ts-t0)/dur);
        setProgress(ease(k));
        if(k<1) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    if('IntersectionObserver' in window){
      var io=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ run(); io.disconnect(); } }); }, { threshold:0.2, rootMargin:'0px 0px -8% 0px' });
      io.observe(sec);
    } else { run(); }
    setTimeout(function(){ if(!started) run(); }, 2600);
  }catch(e){ try{ document.getElementById('sannasaMaster').style.setProperty('--unroll-progress',1); }catch(_){ } }
})();
</script>
