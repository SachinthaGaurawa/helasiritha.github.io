<script type="module" src="app.js"></script>
<script>
/* Entry gateway — standalone, independent of app.js so it can never trap a visitor */
(function(){
  /* Always start at the very top / entry on every load & refresh — no scroll restoration */
  if('scrollRestoration' in history){ try{ history.scrollRestoration='manual'; }catch(_){} }
  window.scrollTo(0,0);
  document.documentElement.classList.add('entry-lock');   /* lock page scroll behind the gateway */
  var e=document.getElementById('entry');
  if(!e){ document.documentElement.classList.remove('entry-lock'); return; }

  /* Entry text in the visitor's stored language only (Sinhala default) — language purity */
  var lang='si'; try{ lang = localStorage.getItem('hs_lang') || 'si'; }catch(_){}
  var TX = {
    si:{ eyebrow:'ශුභ මංගලම්', names:'කෞශානි <span class="amp">&amp;</span> ගෞරව', sub:'අපගේ විවාහ මංගල්‍යයට ඔබ සාදරයෙන් ආරාධනා කරමු', cta:'පහන දැල්වීමට ස්පර්ශ කරන්න' },
    en:{ eyebrow:'The Wedding Of', names:'Kaushani <span class="amp">&amp;</span> Gaurawa', sub:'We joyfully invite you to celebrate our wedding day', cta:'Tap the lamp to enter' }
  };
  var tx = TX[lang] || TX.si;
  if(lang==='en'){ try{ document.documentElement.lang='en'; }catch(_){} }
  (function(){
    var eb=e.querySelector('.entry-eyebrow'); if(eb) eb.textContent=tx.eyebrow;
    var nm=e.querySelector('.entry-names'); if(nm) nm.innerHTML=tx.names;
    var sb=e.querySelector('.entry-sub'); if(sb) sb.textContent=tx.sub;
    var ct=e.querySelector('.entry-cta'); if(ct) ct.textContent=tx.cta;
  })();

  var done=false;
  function enter(){
    if(done){return;} done=true;
    window.scrollTo(0,0);                                  /* the site opens at its very top */
    e.classList.add('go');
    document.documentElement.classList.remove('entry-lock');
    document.documentElement.classList.add('entered');    /* unlocks page scroll (CSS) */
    var p=document.getElementById('preloader'); if(p){ p.classList.add('gone'); }
    setTimeout(function(){ if(e&&e.parentNode){ e.parentNode.removeChild(e); } }, 1600);
  }
  var b=document.getElementById('entryEnter');
  if(b){ b.addEventListener('click', enter); }
  e.addEventListener('click', function(ev){ if(ev.target===e){ enter(); } });
  document.addEventListener('keydown', function(ev){
    if(!done && (ev.key==='Enter' || ev.key===' ' || ev.key==='Escape')){ enter(); }
  });
  /* refresh / back-forward cache restore → force top while the gateway is still up */
  window.addEventListener('pageshow', function(){ if(!done){ window.scrollTo(0,0); } });
})();
</script>
