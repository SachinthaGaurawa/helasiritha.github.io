<!doctype html>
<html lang="si">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0a0a0c">
<title>කෞශානි & ගෞරව · මංගල ආරාධනය</title>
<meta name="description" content="කෞශානි සහ ගෞරවගේ මංගල උත්සවයට ඔබට සාදරයෙන් ආරාධනා කරමු. · You are warmly invited to the wedding of Kaushani & Gaurawa.">
<meta property="og:title" content="කෞශානි & ගෞරව · Wedding">
<meta property="og:description" content="අපගේ විවාහ මංගල්‍යය සැමරීමට ඔබට ආරාධනා කරමු ✦">
<meta property="og:type" content="website">
<link rel="icon" type="image/png" href="https://res.cloudinary.com/dzrfpc9be/image/upload/v1781120583/favicon_jb60x8.png">
<link rel="apple-touch-icon" href="https://res.cloudinary.com/dzrfpc9be/image/upload/v1781120583/favicon_jb60x8.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Noto+Sans+Sinhala:wght@400;500;600;700&family=Noto+Serif+Sinhala:wght@500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;0,800;0,900;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<!-- ░░ Preloader ░░ -->
<div id="preloader" class="preloader" aria-hidden="true">
  <div class="pre-inner">
    <div class="pre-ring"></div>
    <div class="pre-mono foil">K<span class="amp">&amp;</span>G</div>
    <div class="pre-text">හෙළ සිරිත</div>
  </div>
</div>

<!-- ░░ Scroll progress ░░ -->
<div id="scrollProgress" class="scroll-progress" aria-hidden="true"></div>

<!-- ░░ Navigation ░░ -->
<header id="nav" class="nav">
  <div class="nav-inner wrap">
    <a href="#hero" class="brand"><span class="brand-mark" aria-hidden="true"></span><span id="brandName">හෙළ සිරිත</span></a>
    <nav class="nav-links" aria-label="Sections">
      <a href="#invitation" id="nav-invitation">ආරාධනය</a>
      <a href="#agenda" id="nav-agenda">වැඩසටහන</a>
      <a href="#gallery" id="nav-gallery">මතකයන්</a>
      <a href="#blessings" id="nav-blessings">සුබ පැතුම්</a>
      <a href="#rsvp" id="nav-rsvp">පැමිණීම</a>
    </nav>
    <div class="nav-actions">
      <button id="langToggle" class="lang-toggle" type="button" aria-label="Switch to English">EN</button>
      <button id="navBurger" class="nav-burger" type="button" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>

<!-- ░░ Mobile drawer ░░ -->
<nav id="navDrawer" class="nav-drawer" aria-label="Menu">
  <a class="js-drawer-link" data-k="invitation" href="#invitation">ආරාධනය</a>
  <a class="js-drawer-link" data-k="agenda" href="#agenda">වැඩසටහන</a>
  <a class="js-drawer-link" data-k="gallery" href="#gallery">මතකයන්</a>
  <a class="js-drawer-link" data-k="blessings" href="#blessings">සුබ පැතුම්</a>
  <a class="js-drawer-link" data-k="rsvp" href="#rsvp">පැමිණීම</a>
</nav>

<main>

  <!-- ░░ HERO ░░ -->
  <section id="hero" class="hero">
    <canvas id="fxCanvas" class="fx-canvas" aria-hidden="true"></canvas>
    <div class="hero-aurora" aria-hidden="true"></div>
    <div class="hero-vignette" aria-hidden="true"></div>
    <div class="hero-inner wrap">
      <p id="heroEyebrow" class="eyebrow"></p>
      <div id="heroPortrait" class="hero-portrait"></div>
      <h1 id="heroNames" class="hero-names foil"></h1>
      <p id="heroTag" class="hero-tag"></p>
      <div class="hero-meta">
        <span id="heroDate" class="hero-date"></span>
        <span class="hero-sep" aria-hidden="true"></span>
        <span id="heroVenue" class="hero-venue"></span>
      </div>
      <div class="hero-cta">
        <button id="heroRsvpBtn" class="btn" type="button"></button>
      </div>
    </div>
    <a id="scrollCue" class="scroll-cue" href="#invitation" aria-label="Scroll">
      <span class="cue-dot" aria-hidden="true"></span>
      <span class="cue-lbl"></span>
    </a>
  </section>

  <!-- ░░ INVITATION ░░ -->
  <section id="invitation" class="section">
    <div class="wrap center">
      <p id="invEyebrow" class="eyebrow reveal"></p>
      <h2 id="invTitle" class="sec-title foil reveal"></h2>
      <div class="orn-floral" aria-hidden="true"></div>
      <div id="inviteBody" class="inv-card glass reveal"></div>
      <div class="orn-crest-seal" aria-hidden="true"></div>
    </div>
  </section>

  <!-- ░░ COUNTDOWN ░░ -->
  <section id="countdown" class="section">
    <div class="wrap center">
      <p id="cdEyebrow" class="eyebrow reveal"></p>
      <h2 id="cdTitle" class="sec-title foil reveal"></h2>
      <div id="cdGrid" class="cd-grid reveal">
        <div id="cdD" class="cd-cell"><span class="cd-num">00</span><span class="cd-lbl"></span></div>
        <div id="cdH" class="cd-cell"><span class="cd-num">00</span><span class="cd-lbl"></span></div>
        <div id="cdM" class="cd-cell"><span class="cd-num">00</span><span class="cd-lbl"></span></div>
        <div id="cdS" class="cd-cell"><span class="cd-num">00</span><span class="cd-lbl"></span></div>
      </div>
      <p id="cdDone" class="cd-done foil" style="display:none"></p>
    </div>
  </section>

  <!-- ░░ RSVP ░░ -->
  <section id="rsvp" class="section">
    <div class="wrap center">
      <p id="rsvpEyebrow" class="eyebrow reveal"></p>
      <h2 id="rsvpTitle" class="sec-title foil reveal"></h2>
      <p id="rsvpSub" class="sec-sub reveal"></p>
      <div class="rsvp-card glass reveal">
        <p id="rsvpClosed" class="rsvp-closed" style="display:none"></p>
        <div id="rsvpStages">

          <div id="stSearch" class="rsvp-stage active">
            <p id="rsvpHelp" class="note"></p>
            <div class="search-row">
              <input id="rsvpSearchInput" class="inp" type="text" autocomplete="off" inputmode="text">
              <button id="rsvpSearchBtn" class="btn" type="button"></button>
            </div>
            <div id="rsvpResults" class="guest-results"></div>
          </div>

          <div id="stConfirm" class="rsvp-stage">
            <div id="confName" class="conf-name"></div>
            <p id="willAttendQ" class="rsvp-q"></p>
            <div class="choice-row">
              <button id="choiceYes" class="choice yes" type="button"></button>
              <button id="choiceNo" class="choice no" type="button"></button>
            </div>
            <div id="attendExtras" class="attend-extras" style="display:none">
              <p id="liquorQ" class="rsvp-q"></p>
              <div class="choice-row sm">
                <button id="liqYes" class="choice yes" type="button"></button>
                <button id="liqNo" class="choice no" type="button"></button>
              </div>
              <p id="countQ" class="rsvp-q"></p>
              <div class="party-row">
                <button id="pMinus" class="party-btn" type="button" aria-label="−">−</button>
                <span id="pVal" class="party-val">1</span>
                <button id="pPlus" class="party-btn" type="button" aria-label="+">+</button>
              </div>
              <div class="field">
                <label id="dietLbl" for="rsvpDiet"></label>
                <input id="rsvpDiet" class="inp" type="text">
              </div>
            </div>
            <div class="rsvp-actions">
              <button id="rsvpBack" class="btn ghost" type="button"></button>
              <button id="rsvpSubmit" class="btn" type="button"></button>
            </div>
          </div>

          <div id="stThanks" class="rsvp-stage">
            <div class="rsvp-thanks">
              <div id="rsvpThanksBig" class="big foil"></div>
              <p id="rsvpThanksMsg"></p>
              <button id="rsvpAgain" class="btn ghost" type="button"></button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </section>

  <!-- ░░ AGENDA ░░ -->
  <section id="agenda" class="section">
    <div class="wrap center">
      <p id="agEyebrow" class="eyebrow reveal"></p>
      <h2 id="agendaTitle" class="sec-title foil reveal"></h2>
      <p id="agendaSub" class="sec-sub reveal"></p>
      <div id="agendaList" class="agenda-list"></div>
    </div>
  </section>

  <!-- ░░ GALLERY ░░ -->
  <section id="gallery" class="section">
    <div class="wrap center">
      <p id="galEyebrow" class="eyebrow reveal"></p>
      <h2 id="galleryTitle" class="sec-title foil reveal"></h2>
      <p id="gallerySub" class="sec-sub reveal"></p>
      <div id="masonry" class="masonry"></div>
    </div>
  </section>

  <!-- ░░ CELEBRATION COUNTER ░░ -->
  <section id="lamp" class="section">
    <div class="wrap center">
      <p id="lampEyebrow" class="eyebrow reveal"></p>
      <h2 id="lampTitle" class="sec-title foil reveal"></h2>
      <p id="lampSub" class="sec-sub reveal"></p>
      <div class="counter reveal">
        <span id="lampCount" class="counter-num foil">0</span>
        <span id="lampCap" class="counter-cap"></span>
      </div>
    </div>
  </section>

  <!-- ░░ LOVE NOTE ░░ -->
  <section id="lovenote" class="section">
    <div class="wrap center">
      <div class="love-card glass reveal">
        <p id="loveEyebrow" class="eyebrow"></p>
        <h2 id="loveTitle" class="sec-title foil"></h2>
        <p id="loveSub" class="sec-sub"></p>
        <p id="loveText" class="love-text"></p>
        <div id="loveSign" class="love-sign"></div>
      </div>
    </div>
  </section>

  <!-- ░░ WISHES / BLESSINGS ░░ -->
  <section id="blessings" class="section">
    <div class="wrap center">
      <p id="blEyebrow" class="eyebrow reveal"></p>
      <h2 id="blessingsTitle" class="sec-title foil reveal"></h2>
      <p id="blessingsSub" class="sec-sub reveal"></p>
      <div id="blessGrid" class="bless-grid"></div>
      <div class="bless-form glass reveal">
        <div class="field">
          <label id="blNameLbl" for="blName"></label>
          <input id="blName" class="inp" type="text" autocomplete="name">
        </div>
        <div class="field">
          <label id="blMsgLbl" for="blMsg"></label>
          <textarea id="blMsg" class="inp" rows="4"></textarea>
        </div>
        <button id="blSuggest" class="btn ghost suggest" type="button"></button>
        <button id="blSend" class="btn block" type="button"></button>
        <p id="blStatus" class="note" role="status" aria-live="polite"></p>
      </div>
    </div>
  </section>

</main>

<!-- ░░ FOOTER ░░ -->
<footer class="footer">
  <div class="wrap center">
    <div class="foot-mark orn-emblem" aria-hidden="true"></div>
    <div id="footNames" class="foot-names foil"></div>
    <div id="footDate" class="foot-date"></div>
    <div id="footActions" class="foot-actions"></div>
    <div class="foot-credit">හෙළ සිරිත · made with <span class="heart">♥</span></div>
  </div>
</footer>

<!-- ░░ Lightbox ░░ -->
<div id="lightbox" class="lightbox" aria-hidden="true">
  <button id="lbClose" class="lb-close" type="button" aria-label="Close">✕</button>
  <button id="lbPrev" class="lb-btn lb-prev" type="button" aria-label="Previous">‹</button>
  <img id="lbImg" alt="">
  <button id="lbNext" class="lb-btn lb-next" type="button" aria-label="Next">›</button>
  <div id="lbCap" class="lb-cap"></div>
</div>

<!-- ░░ Floating controls ░░ -->
<button id="musicBtn" class="fab music" type="button" aria-pressed="false" aria-label="Music" style="display:none">
  <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l11-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="17" cy="16" r="3"/></svg>
  <span class="eq" aria-hidden="true"><i></i><i></i><i></i></span>
</button>
<button id="toTop" class="fab to-top" type="button" aria-label="Top">
  <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
</button>

<script type="module" src="assets/app.js"></script>
</body>
</html>
