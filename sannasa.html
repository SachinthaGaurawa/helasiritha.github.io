<html lang="en">
<head>
<meta charset="UTF-8">

<title>Ultra-Realistic Procedural Sannasa Scroll with LERP Smooth Scrolling</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;500;600;700;800&family=Gemunu+Libre:wght@400;500;600;700&family=IM+Fell+English:ital@0;1&family=Pinyon+Script&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
    /* =======================================================================
       1. CORE RESET & ENVIRONMENT MAPPING
       ======================================================================= */
    *, *::before, *::after {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        padding: 0;
        background-color: #030303;
        font-family: sans-serif;
        color: #fff;
        overflow-x: hidden;
    }

    /* Long viewport wrapper to allow the user to scroll and unfurl the scroll */
  .scroll-viewport {
        position: relative;
        width: 100%;
                /* STATIC content-flow: height is content-derived — fitSannasa() sets the exact px on
           every edit/resize. No fixed runway. The scroll is fully unrolled and lives in normal flow. */
        height: auto;
        overflow: hidden;            /* clips ONLY the empty scaled-reserve gap — never a wooden roll */
        padding: 28px 0 30px;        /* breathing above the top roll and below the bottom roll */
        background-image: radial-gradient(circle at center, #181818 0%, #030303 100%);
    }

    /* =======================================================================
       2. MASTER STICKY CONTAINER ARCHITECTURE
       ======================================================================= */
  .scroll-sticky-scene {
        position: static;            /* NORMAL DOCUMENT FLOW — no viewport pinning */
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: flex-start;     /* top roll pinned to the top of the assembly */
        padding: 0 10px;             /* side breathing only; vertical handled by .scroll-viewport */
        overflow: visible;           /* NEVER clip the wooden rolls */
        pointer-events: none;
    }

  .scroll-master-container {
        position: relative;
        width: 650px;
        display: flex;
        flex-direction: column;
        align-items: center;
        perspective: 1500px; 
        transform-style: preserve-3d;
        /* Cinematic drop shadow creates deep detachment from the dark canvas */
        filter: drop-shadow(0 50px 70px rgba(0,0,0,0.98));
        pointer-events: auto;
    }

    /* =======================================================================
       3. CYLINDRICAL ROLLS WITH ORGANIC TEXTURING
       ======================================================================= */
  .scroll-cylinder {
        position: relative;
        width: 110%; /* Extends past unrolled margins for volumetric structural realism */
        height: 84px;
        z-index: 10;
        border-radius: 42px; 
        filter: url('#edge-fray-light');
        background-repeat: repeat;
        /* Promotes cylinder layers to individual GPU compositor layers */
        will-change: transform, background-position;
        transform: translateZ(0);
    }

    /* TOP CYLINDER LIGHTING AND SHADOWS */
  .scroll-cylinder.top {
        margin-bottom: -22px; /* Pulls flat paper underneath the roll core */
        background-image: 
            url('#paper-grain'), 
            linear-gradient(
                to bottom, 
                #331502 0%,    /* Core shadow rolling backward away from light */
                #8e5d32 15%,   /* Highlight transition */
                #fcdcab 35%,   /* Specular highlight reflecting light source */
                #8e5d32 65%,   /* Mid-tone decay */
                #331502 90%,   /* Shadow approaching under-curve */
                #140700 100%   /* Complete ambient occlusion */
            );
        background-blend-mode: multiply;
        box-shadow: 
            0 15px 30px -5px rgba(0,0,0,0.85),
            0 5px 10px -2px rgba(0,0,0,0.95);
        background-position-y: calc(var(--unroll-progress) * 320px);
    }

    /* BOTTOM CYLINDER LIGHTING AND SHADOWS */
  .scroll-cylinder.bottom {
        margin-top: -22px; 
        background-image: 
            url('#paper-grain'), 
            linear-gradient(
                to bottom, 
                #140700 0%,    
                #331502 15%,   
                #fcdcab 50%,   /* Highlights face slightly upward toward the center screen */
                #8e5d32 75%,   
                #1a0901 100%   
            );
        background-blend-mode: multiply;
        box-shadow: 
            0 30px 45px -10px rgba(0,0,0,0.95),
            0 12px 20px -5px rgba(0,0,0,0.98);
        background-position-y: calc(var(--unroll-progress) * -320px);
    }

    /* =======================================================================
       4. CONCENTRIC SPIRAL END-CAPS (Pixel-by-pixel match to reference image)
       ======================================================================= */
  .cylinder-cap {
        position: absolute;
        top: 50%;
        width: 32px;
        height: 72px;
        margin-top: -36px; /* Centered along the cylinder equator */
        z-index: -1;
        filter: url('#edge-fray-light');
        will-change: transform;
    }

  .cylinder-cap.left {
        left: -14px;
    }

  .cylinder-cap.right {
        right: -14px;
        transform: scaleX(-1); /* Inverts path horizontally for organic asymmetry */
    }

    /* =======================================================================
       5. MAIN UNROLLED PARCHMENT BODY (GPU COMPOSITOR DOMRevealer)
       ======================================================================= */
  .scroll-body-wrapper {
        position: relative;
        width: 100%;
        /* Driven completely via GPU-calculated custom CSS variables to avoid layout reflows */
        height: calc(var(--unroll-progress) * var(--paper-h));
        overflow: hidden; /* Clamps inner paper container during reveal */
        filter: url('#edge-fray-heavy'); 
        will-change: height;
        transform: translateZ(0);
    }

  .scroll-flat-paper {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: var(--paper-h); /* content-driven target (fitSannasa) */
        background-color: #d6a874; /* Base organic parchment hue */
        
        /* Edge destruction coordinates mimicking natural fiber erosion */
        clip-path: polygon(
            0% 0%, 100% 0%, 
            100% 8%, 94% 11%, 98% 13%, 100% 16%, 
            100% 28%, 90% 32%, 97% 37%, 92% 41%, 100% 45%, 
            100% 55%, 88% 60%, 95% 65%, 89% 69%, 100% 74%, 
            100% 83%, 93% 87%, 100% 92%, 
            100% 100%, 0% 100%, 
            0% 90%, 5% 86%, 0% 82%, 
            0% 70%, 12% 65%, 4% 60%, 10% 54%, 0% 49%, 
            0% 40%, 8% 35%, 2% 31%, 
            0% 20%, 6% 16%, 0% 13%
        );

        /* Surface decay, stains, edge-burn and vignette gradients */
        background-image: 
            url('#paper-grain'),
            radial-gradient(circle at 18% 28%, rgba(54, 23, 2, 0.25) 0%, transparent 22%), 
            radial-gradient(circle at 82% 62%, rgba(54, 23, 2, 0.28) 0%, transparent 28%),  
            linear-gradient(to right, rgba(58, 23, 4, 0.88) 0%, rgba(92, 55, 22, 0.15) 15%, transparent 25%, transparent 75%, rgba(92, 55, 22, 0.15) 85%, rgba(58, 23, 4, 0.88) 100%),
            radial-gradient(circle at center, transparent 20%, rgba(77, 43, 14, 0.8) 100%);
        background-blend-mode: multiply;
        box-shadow: inset 0 0 100px rgba(43, 19, 4, 0.98);
    }

    /* =======================================================================
       6. PROCEDURAL 3D EMBOSSED ROYAL SEAL (Historically Accurate Sinhala Crest)
       ======================================================================= */
  .embossed-seal {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 240px;
        height: 240px;
        opacity: 0.28; /* Pressed watermark blending */
        mix-blend-mode: overlay;
        filter: url('#emboss-filter');
    }

    /* =======================================================================
       7. DECORATIVE LAYERS
       ======================================================================= */
  .scroll-decorations {
        position: absolute;
        inset: 40px;
        border: 2px solid rgba(77, 43, 14, 0.4);
        pointer-events: none;
        box-shadow: 0 0 15px rgba(77, 43, 14, 0.2);
    }

  .scroll-instruction {
        position: absolute;
        bottom: 40px;
        font-size: 14px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: rgba(255,255,255,0.4);
        pointer-events: none;
        text-align: center;
        width: 100%;
        animation: pulse 2.5s infinite ease-in-out;
    }

    @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.7; }
    }

    /* ═══════════════════════════════════════════════════════════════════
       ADDED (non-destructive): responsive fit + crisp wedding-content overlay
       — your scroll, filters, cylinders, caps and JS are untouched below/above
       ═══════════════════════════════════════════════════════════════════ */

    /* Fit your fixed 650px scroll to any screen. Proportions & design unchanged
       — the whole assembly is simply scaled to the viewport width. */
    .scroll-master-container {
        --unroll-progress: 0;   /* initial value only; your JS drives it every frame */
        transform: scale(min(1, calc((100vw - 20px) / 650), calc((100vh - 44px) / 940)));
        transform-origin: top center;
    }

    /* Invitation text lives in its OWN layer — revealed in perfect sync with the
       parchment (shares --unroll-progress) but OUTSIDE the edge-fray-heavy filter,
       so the writing stays crisp while the paper edges still tear organically. */
    .decree-overlay {
        position: absolute;
        top: 62px;              /* aligns with the parchment (top cylinder 84px − 22px overlap) */
        left: 0;
        right: 0;
        z-index: 5;             /* above the parchment, below the wooden rolls (z-index:10) */
        height: calc(var(--unroll-progress) * var(--paper-h));
        overflow: hidden;
        pointer-events: none;
    }
    .decree-inner {
        width: 100%;
        height: var(--paper-h);
        padding: 58px 66px 42px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        color: #3d1f0b;
        font-family: 'Abhaya Libre', serif;
        /* a soft warm glow lifts the writing area so aged ink stays legible */
        background: radial-gradient(78% 58% at 50% 42%, rgba(247,226,182,0.26) 0%, transparent 62%);
    }
    .dc-sri { font-weight: 800; font-size: 27px; letter-spacing: 0.02em; margin-bottom: 3px;
        text-shadow: 0 1px 0 rgba(255,240,214,0.5), 0 0 2px rgba(45,22,8,0.4); }
    .dc-rule { display: flex; align-items: center; gap: 8px; color: #a9812f; margin: 2px 0 9px; font-size: 12px; }
    .dc-rule::before, .dc-rule::after { content: ""; height: 1px; width: 52px;
        background: linear-gradient(90deg, transparent, #a9812f, transparent); }
    .dc-eyebrow { font-family: 'Gemunu Libre', serif; font-size: 14px; letter-spacing: 0.18em; color: #5e3a1f; margin-bottom: 12px; }
    .dc-lineage { font-family: 'Gemunu Libre', serif; font-size: 12.5px; line-height: 1.4; letter-spacing: 0.015em; color: #6f4523; max-width: 31ch; margin: 0 auto; }
    .dc-name { font-family: 'Abhaya Libre', serif; font-weight: 800; font-size: 40px; line-height: 1.1; color: #3d1f0b; margin: 1px 0 2px;
        text-shadow: 0 1px 0 rgba(255,240,214,0.5), 0 2px 4px rgba(40,18,4,0.26), 0 0 3px rgba(50,24,8,0.3); }
    .dc-conj { font-family: 'Pinyon Script', cursive; font-size: 26px; color: #a9812f; margin: 3px 0; line-height: 1; }
    .dc-join { font-family: 'Abhaya Libre', serif; font-style: italic; font-size: 13.5px; color: #5e3a1f; margin: 8px auto 0; max-width: 30ch; }
    .dc-body { font-family: 'Abhaya Libre', serif; font-size: 14.5px; line-height: 1.6; color: #5e3a1f;
        max-width: 30ch; margin: 9px auto 0; text-shadow: 0 1px 0 rgba(255,240,214,0.3); }
    .dc-meta { display: flex; flex-wrap: wrap; justify-content: center; gap: 2px 22px; margin: 13px auto 0; }
    .dc-meta .b { min-width: 90px; }
    .dc-meta .l { font-family: 'Gemunu Libre', serif; font-size: 10px; letter-spacing: 0.12em; color: #7c5326; }
    .dc-meta .v { font-family: 'Abhaya Libre', serif; font-weight: 700; font-size: 15px; color: #3d1f0b; }
    .dc-meta .e { font-family: 'Playfair Display', serif; font-style: italic; font-size: 10px; color: #6f421f; }
    .dc-poruwa { font-family: 'Gemunu Libre', serif; font-size: 11px; letter-spacing: 0.04em; color: #7c5326; margin: 11px auto 0; max-width: 33ch; line-height: 1.4; }
    /* Auspicious closing seal — Swasti Siddham — a small framed cartouche (double gold border) */
    .dc-swasti { font-family: 'Abhaya Libre', serif; font-weight: 800; font-size: 15px; letter-spacing: 0.14em;
        color: #5a3410; margin: 15px auto 2px; padding: 6px 20px; border: 1.5px solid #a9812f; border-radius: 2px;
        background: rgba(247,226,182,0.32);
        box-shadow: inset 0 0 0 3px rgba(169,129,47,0.22), 0 1px 2px rgba(40,18,4,0.15);
        text-shadow: 0 1px 0 rgba(255,240,214,0.55); }
    /* zoom-crash guard — disable heavy SVG filters only while pinch/zoomed in */
    html.vv-zoom .scroll-body-wrapper, html.vv-zoom .scroll-cylinder, html.vv-zoom .cylinder-cap, html.vv-zoom .embossed-seal { filter: none !important; }
</style>

    <svg width="0" height="0" style="position: absolute; width: 0; height: 0;">
        <defs>
            <filter id="paper-grain" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="6" result="noise" />
                <feDiffuseLighting in="noise" lightingColor="#ffe7cc" surfaceScale="3.8" result="light">
                    <feDistantLight azimuth="45" elevation="55" />

                <feComposite operator="arithmetic" k1="1" k2="0" k3="0" k4="0" in="SourceGraphic" in2="light" />

            <filter id="edge-fray-heavy" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
                <feTurbulence type="turbulence" baseFrequency="0.065" numOctaves="5" seed="28" result="tornNoise" />
                <feDisplacementMap in="SourceGraphic" in2="tornNoise" scale="18" xChannelSelector="R" yChannelSelector="G" result="displaced" />
            </filter>

            <filter id="edge-fray-light" x="-5%" y="-5%" width="110%" height="110%" color-interpolation-filters="sRGB">

                <feSpecularLighting in="blur" surfaceScale="6" specularConstant="1" specularExponent="16" lighting-color="#ffffff" result="spec">
                    <feDistantLight azimuth="45" elevation="45" />

                <feBlend in="diff" in2="spec" mode="screen" result="lit" />

      function ov(key){ var l=lang(), v=live[key+(l==='si'?'Si':'En')]; return (v!=null && String(v).trim()!=='') ? String(v) : ''; }
      function plain(key){ var v=live[key]; return (v!=null && String(v).trim()!=='') ? String(v) : ''; }

      function render(){
        var l = lang(), t = C[l];

      Promise.all([ import(SDK+"/firebase-app.js"), import(SDK+"/firebase-firestore.js") ]).then(function(m){

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const masterContainer = document.querySelector('.scroll-master-container');
            const topCylinder = document.querySelector('.scroll-cylinder.top');
            const bottomCylinder = document.querySelector('.scroll-cylinder.bottom');

            // LERP Engine Variables
            let currentScrollProgress = 0;
            let targetScrollProgress = 0;
            
            // Tuning μ to exactly 0.18 eliminates the "late" feeling completely (instant response)
            // while filtering out jerky, uneven mouse wheel steps for 60fps/120fps fluid scrolling.
            const lerpSpeed = 0.18; 

            // High-frequency async listener runs with passive flags to bypass DOM render-blocking
            window.addEventListener('scroll', () => {
                const scrollTop = window.scrollY;
                const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
                targetScrollProgress = scrollHeight > 0? scrollTop / scrollHeight : 0;
            }, { passive: true });

            // Synchronized requestAnimationFrame update loop
            function updateRenderLoop() {
                const diff = targetScrollProgress - currentScrollProgress;
                currentScrollProgress += diff * lerpSpeed;

                // Stop calculating when difference becomes microscopically imperceptible
                if (Math.abs(diff) < 0.0001) {
                    currentScrollProgress = targetScrollProgress;
                }

                const progress = Math.max(0, Math.min(1, currentScrollProgress));

                // 1. Instantly update --unroll-progress CSS variable on master container.
                // This allows the GPU to compute clip heights and gradient positions immediately in the compositing thread.
                masterContainer.style.setProperty('--unroll-progress', progress);

                // 2. Rotate the concentric spiral end-caps to perfectly match rotational velocity
                const capRotation = progress * 720; // 2 complete physical rotations
                
                const topCapsLeft = topCylinder.querySelector('.cylinder-cap.left');
                const topCapsRight = topCylinder.querySelector('.cylinder-cap.right');
                const bottomCapsLeft = bottomCylinder.querySelector('.cylinder-cap.left');
                const bottomCapsRight = bottomCylinder.querySelector('.cylinder-cap.right');

                if (topCapsLeft) topCapsLeft.style.transform = `rotate(${-capRotation}deg) translateZ(0)`;
                if (topCapsRight) topCapsRight.style.transform = `scaleX(-1) rotate(${capRotation}deg) translateZ(0)`;
                if (bottomCapsLeft) bottomCapsLeft.style.transform = `rotate(${capRotation}deg) translateZ(0)`;
                if (bottomCapsRight) bottomCapsRight.style.transform = `scaleX(-1) rotate(${-capRotation}deg) translateZ(0)`;

                // Loop synchronized with the monitor's refresh rate (60Hz, 120Hz, 144Hz)
                requestAnimationFrame(updateRenderLoop);
            }

            requestAnimationFrame(updateRenderLoop);
        });
    </script>
