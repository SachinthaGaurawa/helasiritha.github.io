<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra-Realistic Procedural Sannasa Scroll with LERP Smooth Scrolling</title>
<style>
    /* =======================================================================
       1. CORE RESET & ENVIRONMENT MAPPING
       ======================================================================= */
    *, *::before, *::after {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        padding: 0;
        background-color: #030303;
        font-family: sans-serif;
        color: #fff;
        overflow-x: hidden;
    }

    /* Long viewport wrapper to allow the user to scroll and unfurl the scroll */
  .scroll-viewport {
        position: relative;
        width: 100%;
        height: 250vh; /* Cushioned vertical space for smooth LERP unrolling */
        background-image: radial-gradient(circle at center, #181818 0%, #030303 100%);
    }

    /* =======================================================================
       2. MASTER STICKY CONTAINER ARCHITECTURE
       ======================================================================= */
  .scroll-sticky-scene {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start; /* FIXED TOP ALIGNMENT */
        padding-top: 8vh; /* Fixed vertical position for stationary top cylinder */
        overflow: hidden;
        pointer-events: none; /* Passes scrolling through to the viewport */
    }

  .scroll-master-container {
        position: relative;
        width: 650px;
        display: flex;
        flex-direction: column;
        align-items: center;
        perspective: 1500px; 
        transform-style: preserve-3d;
        /* Cinematic drop shadow creates deep detachment from the dark canvas */
        filter: drop-shadow(0 50px 70px rgba(0,0,0,0.98));
        pointer-events: auto;
    }

    /* =======================================================================
       3. CYLINDRICAL ROLLS WITH ORGANIC TEXTURING
       ======================================================================= */
  .scroll-cylinder {
        position: relative;
        width: 110%; /* Extends past unrolled margins for volumetric structural realism */
        height: 84px;
        z-index: 10;
        border-radius: 42px; 
        filter: url('#edge-fray-light');
        background-repeat: repeat;
        /* Promotes cylinder layers to individual GPU compositor layers */
        will-change: transform, background-position;
        transform: translateZ(0);
    }

    /* TOP CYLINDER LIGHTING AND SHADOWS */
  .scroll-cylinder.top {
        margin-bottom: -22px; /* Pulls flat paper underneath the roll core */
        background-image: 
            url('#paper-grain'), 
            linear-gradient(
                to bottom, 
                #331502 0%,    /* Core shadow rolling backward away from light */
                #8e5d32 15%,   /* Highlight transition */
                #fcdcab 35%,   /* Specular highlight reflecting light source */
                #8e5d32 65%,   /* Mid-tone decay */
                #331502 90%,   /* Shadow approaching under-curve */
                #140700 100%   /* Complete ambient occlusion */
            );
        background-blend-mode: multiply;
        box-shadow: 
            0 15px 30px -5px rgba(0,0,0,0.85),
            0 5px 10px -2px rgba(0,0,0,0.95);
        background-position-y: calc(var(--unroll-progress) * 320px);
    }

    /* BOTTOM CYLINDER LIGHTING AND SHADOWS */
  .scroll-cylinder.bottom {
        margin-top: -22px; 
        background-image: 
            url('#paper-grain'), 
            linear-gradient(
                to bottom, 
                #140700 0%,    
                #331502 15%,   
                #fcdcab 50%,   /* Highlights face slightly upward toward the center screen */
                #8e5d32 75%,   
                #1a0901 100%   
            );
        background-blend-mode: multiply;
        box-shadow: 
            0 30px 45px -10px rgba(0,0,0,0.95),
            0 12px 20px -5px rgba(0,0,0,0.98);
        background-position-y: calc(var(--unroll-progress) * -320px);
    }

    /* =======================================================================
       4. CONCENTRIC SPIRAL END-CAPS (Pixel-by-pixel match to reference image)
       ======================================================================= */
  .cylinder-cap {
        position: absolute;
        top: 50%;
        width: 32px;
        height: 72px;
        margin-top: -36px; /* Centered along the cylinder equator */
        z-index: -1;
        filter: url('#edge-fray-light');
        will-change: transform;
    }

  .cylinder-cap.left {
        left: -14px;
    }

  .cylinder-cap.right {
        right: -14px;
        transform: scaleX(-1); /* Inverts path horizontally for organic asymmetry */
    }

    /* =======================================================================
       5. MAIN UNROLLED PARCHMENT BODY (GPU COMPOSITOR DOMRevealer)
       ======================================================================= */
  .scroll-body-wrapper {
        position: relative;
        width: 100%;
        /* Driven completely via GPU-calculated custom CSS variables to avoid layout reflows */
        height: calc(var(--unroll-progress) * 650px);
        overflow: hidden; /* Clamps inner paper container during reveal */
        filter: url('#edge-fray-heavy'); 
        will-change: height;
        transform: translateZ(0);
    }

  .scroll-flat-paper {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 650px; /* Locked target height */
        background-color: #d6a874; /* Base organic parchment hue */
        
        /* Edge destruction coordinates mimicking natural fiber erosion */
        clip-path: polygon(
            0% 0%, 100% 0%, 
            100% 8%, 94% 11%, 98% 13%, 100% 16%, 
            100% 28%, 90% 32%, 97% 37%, 92% 41%, 100% 45%, 
            100% 55%, 88% 60%, 95% 65%, 89% 69%, 100% 74%, 
            100% 83%, 93% 87%, 100% 92%, 
            100% 100%, 0% 100%, 
            0% 90%, 5% 86%, 0% 82%, 
            0% 70%, 12% 65%, 4% 60%, 10% 54%, 0% 49%, 
            0% 40%, 8% 35%, 2% 31%, 
            0% 20%, 6% 16%, 0% 13%
        );

        /* Surface decay, stains, edge-burn and vignette gradients */
        background-image: 
            url('#paper-grain'),
            radial-gradient(circle at 18% 28%, rgba(54, 23, 2, 0.25) 0%, transparent 22%), 
            radial-gradient(circle at 82% 62%, rgba(54, 23, 2, 0.28) 0%, transparent 28%),  
            linear-gradient(to right, rgba(58, 23, 4, 0.88) 0%, rgba(92, 55, 22, 0.15) 15%, transparent 25%, transparent 75%, rgba(92, 55, 22, 0.15) 85%, rgba(58, 23, 4, 0.88) 100%),
            radial-gradient(circle at center, transparent 20%, rgba(77, 43, 14, 0.8) 100%);
        background-blend-mode: multiply;
        box-shadow: inset 0 0 100px rgba(43, 19, 4, 0.98);
    }

    /* =======================================================================
       6. PROCEDURAL 3D EMBOSSED ROYAL SEAL (Historically Accurate Sinhala Crest)
       ======================================================================= */
  .embossed-seal {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 240px;
        height: 240px;
        opacity: 0.28; /* Pressed watermark blending */
        mix-blend-mode: overlay;
        filter: url('#emboss-filter');
    }

    /* =======================================================================
       7. DECORATIVE LAYERS
       ======================================================================= */
  .scroll-decorations {
        position: absolute;
        inset: 40px;
        border: 2px solid rgba(77, 43, 14, 0.4);
        pointer-events: none;
        box-shadow: 0 0 15px rgba(77, 43, 14, 0.2);
    }

  .scroll-instruction {
        position: absolute;
        bottom: 40px;
        font-size: 14px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: rgba(255,255,255,0.4);
        pointer-events: none;
        text-align: center;
        width: 100%;
        animation: pulse 2.5s infinite ease-in-out;
    }

    @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.7; }
    }
</style>
</head>
<body>

    <svg width="0" height="0" style="position: absolute; width: 0; height: 0;">
        <defs>
            <filter id="paper-grain" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="6" result="noise" />
                <feDiffuseLighting in="noise" lightingColor="#ffe7cc" surfaceScale="3.8" result="light">
                    <feDistantLight azimuth="45" elevation="55" />
                </feDiffuseLighting>
                <feComposite operator="arithmetic" k1="1" k2="0" k3="0" k4="0" in="SourceGraphic" in2="light" />
            </filter>

            <filter id="edge-fray-heavy" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
                <feTurbulence type="turbulence" baseFrequency="0.065" numOctaves="5" seed="28" result="tornNoise" />
                <feDisplacementMap in="SourceGraphic" in2="tornNoise" scale="18" xChannelSelector="R" yChannelSelector="G" result="displaced" />
            </filter>

            <filter id="edge-fray-light" x="-5%" y="-5%" width="110%" height="110%" color-interpolation-filters="sRGB">
                <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="3" seed="14" result="tornNoiseLight" />
                <feDisplacementMap in="SourceGraphic" in2="tornNoiseLight" scale="4" xChannelSelector="R" yChannelSelector="G" result="displaced" />
            </filter>

            <filter id="emboss-filter" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
                <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="blur" />
                <feSpecularLighting in="blur" surfaceScale="6" specularConstant="1" specularExponent="16" lighting-color="#ffffff" result="spec">
                    <feDistantLight azimuth="45" elevation="45" />
                </feSpecularLighting>
                <feDiffuseLighting in="blur" surfaceScale="6" diffuseConstant="1" lighting-color="#d1a56f" result="diff">
                    <feDistantLight azimuth="45" elevation="45" />
                </feDiffuseLighting>
                <feBlend in="diff" in2="spec" mode="screen" result="lit" />
                <feComposite in="lit" in2="SourceGraphic" operator="in" />
            </filter>
        </defs>
    </svg>

    <div class="scroll-viewport">
        
        <div class="scroll-instruction">👇 Scroll Down Smoothly 👇</div>

        <div class="scroll-sticky-scene">
            <div class="scroll-master-container">
                
                <div class="scroll-cylinder top">
                    <svg class="cylinder-cap left" viewBox="0 0 50 100">
                        <ellipse cx="25" cy="50" rx="24" ry="48" fill="#1b0c03" />
                        <path d="M25,2 C38,2 47,15 47,50 C47,85 38,98 25,98 C12,98 3,85 3,50 C3,20 18,10 25,10 C34,10 41,22 41,50 C41,78 34,90 25,90 C16,90 9,78 9,50 C9,28 20,18 25,18 C31,18 36,28 36,50 C36,72 31,82 25,82 C19,82 14,72 14,50 C14,34 22,26 25,26 C28,26 31,34 31,50 C31,66 28,74 25,74 C22,74 19,66 19,50 C19,40 23,34 25,34 C26,34 27,40 27,50" fill="none" stroke="#875127" stroke-width="2.2" stroke-linecap="round" />
                        <ellipse cx="25" cy="50" rx="4.5" ry="11" fill="#000" />
                    </svg>
                    <svg class="cylinder-cap right" viewBox="0 0 50 100">
                        <ellipse cx="25" cy="50" rx="24" ry="48" fill="#1b0c03" />
                        <path d="M25,2 C38,2 47,15 47,50 C47,85 38,98 25,98 C12,98 3,85 3,50 C3,20 18,10 25,10 C34,10 41,22 41,50 C41,78 34,90 25,90 C16,90 9,78 9,50 C9,28 20,18 25,18 C31,18 36,28 36,50 C36,72 31,82 25,82 C19,82 14,72 14,50 C14,34 22,26 25,26 C28,26 31,34 31,50 C31,66 28,74 25,74 C22,74 19,66 19,50 C19,40 23,34 25,34 C26,34 27,40 27,50" fill="none" stroke="#875127" stroke-width="2.2" stroke-linecap="round" />
                        <ellipse cx="25" cy="50" rx="4.5" ry="11" fill="#000" />
                    </svg>
                </div>
                
                <div class="scroll-body-wrapper">
                    <div class="scroll-flat-paper">
                        
                        <div class="embossed-seal">
                            <svg viewBox="0 0 200 200" width="100%" height="100%">
                                <circle cx="100" cy="100" r="85" fill="none" stroke="#000" stroke-width="4" stroke-dasharray="10 6" />
                                <circle cx="100" cy="100" r="75" fill="none" stroke="#000" stroke-width="2" />
                                <path d="M100,55 C90,55 85,65 85,75 C85,85 92,90 95,95 L95,120 C95,125 105,125 105,120 L105,95 C108,90 115,85 115,75 C115,65 110,55 100,55 Z M100,65 C103,65 105,68 105,71 C105,74 103,77 100,77 C97,77 95,74 95,71 C95,68 97,65 100,65 Z" fill="#000" />
                                <path d="M78,80 L78,135 L84,135 L84,80 Z" fill="#000" /> 
                                <path d="M72,135 L90,135 L90,140 L72,140 Z" fill="#000" /> 
                                <circle cx="81" cy="145" r="4" fill="#000" />
                                <path d="M50,95 C45,95 40,100 40,105 C40,110 45,115 50,115 Z" fill="#000" />
                                <path d="M148,95 C146,98 146,102 148,105 C150,108 154,110 158,110 C155,113 150,113 146,110 C142,107 142,100 148,95 Z" fill="#000" />
                            </svg>
                        </div>

                        <div class="scroll-decorations"></div>
                        
                    </div>
                </div>
                
                <div class="scroll-cylinder bottom">
                    <svg class="cylinder-cap left" viewBox="0 0 50 100">
                        <ellipse cx="25" cy="50" rx="24" ry="48" fill="#1b0c03" />
                        <path d="M25,2 C38,2 47,15 47,50 C47,85 38,98 25,98 C12,98 3,85 3,50 C3,20 18,10 25,10 C34,10 41,22 41,50 C41,78 34,90 25,90 C16,90 9,78 9,50 C9,28 20,18 25,18 C31,18 36,28 36,50 C36,72 31,82 25,82 C19,82 14,72 14,50 C14,34 22,26 25,26 C28,26 31,34 31,50 C31,66 28,74 25,74 C22,74 19,66 19,50 C19,40 23,34 25,34 C26,34 27,40 27,50" fill="none" stroke="#875127" stroke-width="2.2" stroke-linecap="round" />
                        <ellipse cx="25" cy="50" rx="4.5" ry="11" fill="#000" />
                    </svg>
                    <svg class="cylinder-cap right" viewBox="0 0 50 100">
                        <ellipse cx="25" cy="50" rx="24" ry="48" fill="#1b0c03" />
                        <path d="M25,2 C38,2 47,15 47,50 C47,85 38,98 25,98 C12,98 3,85 3,50 C3,20 18,10 25,10 C34,10 41,22 41,50 C41,78 34,90 25,90 C16,90 9,78 9,50 C9,28 20,18 25,18 C31,18 36,28 36,50 C36,72 31,82 25,82 C19,82 14,72 14,50 C14,34 22,26 25,26 C28,26 31,34 31,50 C31,66 28,74 25,74 C22,74 19,66 19,50 C19,40 23,34 25,34 C26,34 27,40 27,50" fill="none" stroke="#875127" stroke-width="2.2" stroke-linecap="round" />
                        <ellipse cx="25" cy="50" rx="4.5" ry="11" fill="#000" />
                    </svg>
                </div>

            </div>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const masterContainer = document.querySelector('.scroll-master-container');
            const topCylinder = document.querySelector('.scroll-cylinder.top');
            const bottomCylinder = document.querySelector('.scroll-cylinder.bottom');

            // LERP Engine Variables
            let currentScrollProgress = 0;
            let targetScrollProgress = 0;
            
            // Tuning μ to exactly 0.18 eliminates the "late" feeling completely (instant response)
            // while filtering out jerky, uneven mouse wheel steps for 60fps/120fps fluid scrolling.
            const lerpSpeed = 0.18; 

            // High-frequency async listener runs with passive flags to bypass DOM render-blocking
            window.addEventListener('scroll', () => {
                const scrollTop = window.scrollY;
                const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
                targetScrollProgress = scrollHeight > 0? scrollTop / scrollHeight : 0;
            }, { passive: true });

            // Synchronized requestAnimationFrame update loop
            function updateRenderLoop() {
                const diff = targetScrollProgress - currentScrollProgress;
                currentScrollProgress += diff * lerpSpeed;

                // Stop calculating when difference becomes microscopically imperceptible
                if (Math.abs(diff) < 0.0001) {
                    currentScrollProgress = targetScrollProgress;
                }

                const progress = Math.max(0, Math.min(1, currentScrollProgress));

                // 1. Instantly update --unroll-progress CSS variable on master container.
                // This allows the GPU to compute clip heights and gradient positions immediately in the compositing thread.
                masterContainer.style.setProperty('--unroll-progress', progress);

                // 2. Rotate the concentric spiral end-caps to perfectly match rotational velocity
                const capRotation = progress * 720; // 2 complete physical rotations
                
                const topCapsLeft = topCylinder.querySelector('.cylinder-cap.left');
                const topCapsRight = topCylinder.querySelector('.cylinder-cap.right');
                const bottomCapsLeft = bottomCylinder.querySelector('.cylinder-cap.left');
                const bottomCapsRight = bottomCylinder.querySelector('.cylinder-cap.right');

                if (topCapsLeft) topCapsLeft.style.transform = `rotate(${-capRotation}deg) translateZ(0)`;
                if (topCapsRight) topCapsRight.style.transform = `scaleX(-1) rotate(${capRotation}deg) translateZ(0)`;
                if (bottomCapsLeft) bottomCapsLeft.style.transform = `rotate(${capRotation}deg) translateZ(0)`;
                if (bottomCapsRight) bottomCapsRight.style.transform = `scaleX(-1) rotate(${-capRotation}deg) translateZ(0)`;

                // Loop synchronized with the monitor's refresh rate (60Hz, 120Hz, 144Hz)
                requestAnimationFrame(updateRenderLoop);
            }

            requestAnimationFrame(updateRenderLoop);
        });
    </script>
</body>
</html>
